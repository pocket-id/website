name: Build Pull Request Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "docs/**"
      - "static/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "svelte.config.js"
      - ".github/workflows/build-pr-preview.yml"

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout pocket-id repo
        uses: actions/checkout@v6
        with:
          repository: pocket-id/pocket-id
          path: pocket-id
          ref: feat/huma-api-docs

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: pocket-id/backend/go.mod

      - name: Generate OpenAPI specification
        run: ./scripts/generate-openapi.sh pocket-id

      - name: Remove pocket-id repo
        run: rm -rf pocket-id

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: preview-build
          path: build
