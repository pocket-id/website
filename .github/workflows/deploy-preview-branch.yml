name: Deploy Preview Branch

on:
  workflow_dispatch:
  push:
    branches:
      - preview
    paths:
      - "src/**"
      - "docs/**"
      - "static/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "svelte.config.js"
      - ".github/workflows/deploy-preview-branch.yml"

permissions:
  actions: read
  deployments: write
  contents: read

jobs:
  deploy-preview-branch:
    runs-on: ubuntu-latest
    name: Deploy Preview Branch to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout pocket-id repo
        uses: actions/checkout@v6
        with:
          repository: pocket-id/pocket-id
          path: pocket-id
          ref: feat/huma-api-docs

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: pocket-id/backend/go.mod

      - name: Generate OpenAPI specification
        run: ./scripts/generate-openapi.sh pocket-id

      - name: Remove pocket-id repo
        run: rm -rf pocket-id

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: AdrianGonz97/refined-cf-pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN_NEW }}
          accountId: ${{ secrets.CF_ACCOUNT_ID_NEW }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          projectName: pocket-id-website
          deploymentName: Preview
          branch: preview
          directory: build
          wranglerVersion: "3"
